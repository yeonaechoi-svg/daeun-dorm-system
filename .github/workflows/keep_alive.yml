name: Supabase Keep Alive

on:
  schedule:
    # 3일마다 한 번씩 실행 (UTC 시간 기준 00:00)
    - cron: '0 0 */3 * *'
  workflow_dispatch: # 직접 수동으로 실행해볼 수 있는 버튼을 활성화합니다.

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Ping to Supabase
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/students?select=count" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
